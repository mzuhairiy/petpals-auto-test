name: E2E Tests (Repository Dispatch)

on:
  repository_dispatch:
    types: [run-e2e]

permissions:
  contents: write
  statuses: write

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      E2E_BASE_URL: ${{ github.event.client_payload.target_url }}
      COMMIT_SHA: ${{ github.event.client_payload.commit_sha }}
      SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
      BASE_URL: ${{ github.event.client_payload.target_url }}
      CI: true
      STATUS_CONTEXT: e2e/playwright

    steps:
      - name: Print dispatch payload
        run: |
          echo "=== Repository Dispatch Payload ==="
          echo "Event type:  ${{ github.event.action }}"
          echo "Target URL:  ${{ github.event.client_payload.target_url }}"
          echo "Commit SHA:  ${{ github.event.client_payload.commit_sha }}"
          echo "Source repo: ${{ github.event.client_payload.source_repo }}"
          echo "==================================="

      - name: "Set commit status: pending"
        if: ${{ github.event.client_payload.commit_sha != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PETPALS_STATUS_PAT }}
          script: |
            const sourceRepo = process.env.SOURCE_REPO || 'mzuhairiy/PetPals';
            const [owner, repo] = sourceRepo.split('/');
            const sha = process.env.COMMIT_SHA;

            if (!sha) {
              core.warning('commit_sha is empty – skipping status report');
              return;
            }

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha,
              state: 'pending',
              context: process.env.STATUS_CONTEXT,
              description: 'E2E tests running',
              target_url: `https://github.com/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            });

      - name: Checkout E2E repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # ── Run smoke tests first ───────────────────────────────────────
      - name: Run Smoke Tests
        id: smoke
        run: npx playwright test --grep @smoke --project=chromium
        continue-on-error: true

      # ── Run full suite (all tests) ──────────────────────────────────
      # Capture stdout to parse the summary for Discord/report stats.
      - name: Run All Tests
        id: alltests
        if: ${{ always() }}
        run: |
          set +e
          npx playwright test --project=chromium 2>&1 | tee /tmp/playwright-output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=${TEST_EXIT_CODE}" >> $GITHUB_OUTPUT
          exit 0
        continue-on-error: true

      # ── Parse test summary from Playwright CLI output ───────────────
      # Playwright prints lines like: "48 passed", "1 flaky", "0 failed", "2 skipped"
      # and a duration in parentheses like "(2.2m)" or "(45.3s)"
      - name: Parse test results from CLI output
        id: stats
        if: ${{ always() }}
        run: |
          OUTPUT_FILE="/tmp/playwright-output.txt"
          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "flaky=0" >> $GITHUB_OUTPUT
            echo "skipped=0" >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
            echo "duration=N/A" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract numbers from Playwright summary (last lines of output)
          PASSED=$(grep -oP '\d+(?= passed)' "$OUTPUT_FILE" | tail -1 || echo "0")
          FAILED=$(grep -oP '\d+(?= failed)' "$OUTPUT_FILE" | tail -1 || echo "0")
          FLAKY=$(grep -oP '\d+(?= flaky)' "$OUTPUT_FILE" | tail -1 || echo "0")
          SKIPPED=$(grep -oP '\d+(?= skipped)' "$OUTPUT_FILE" | tail -1 || echo "0")
          DURATION=$(grep -oP '\(\K[^)]+(?=\))' "$OUTPUT_FILE" | tail -1 || echo "N/A")

          # Default to 0 if empty
          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}
          FLAKY=${FLAKY:-0}
          SKIPPED=${SKIPPED:-0}
          DURATION=${DURATION:-N/A}

          TOTAL=$((PASSED + FAILED + FLAKY + SKIPPED))

          echo "passed=${PASSED}" >> $GITHUB_OUTPUT
          echo "failed=${FAILED}" >> $GITHUB_OUTPUT
          echo "flaky=${FLAKY}" >> $GITHUB_OUTPUT
          echo "skipped=${SKIPPED}" >> $GITHUB_OUTPUT
          echo "total=${TOTAL}" >> $GITHUB_OUTPUT
          echo "duration=${DURATION}" >> $GITHUB_OUTPUT

          echo "=== Parsed Test Stats ==="
          echo "Passed:   ${PASSED}"
          echo "Failed:   ${FAILED}"
          echo "Flaky:    ${FLAKY}"
          echo "Skipped:  ${SKIPPED}"
          echo "Total:    ${TOTAL}"
          echo "Duration: ${DURATION}"
          echo "========================="

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      # ── Commit status — smoke failure no longer blocks deployment ───
      - name: "Set commit status: result"
        if: ${{ always() && github.event.client_payload.commit_sha != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PETPALS_STATUS_PAT }}
          script: |
            const sourceRepo = process.env.SOURCE_REPO || 'mzuhairiy/PetPals';
            const [owner, repo] = sourceRepo.split('/');
            const sha = process.env.COMMIT_SHA;

            if (!sha) {
              core.warning('commit_sha is empty – skipping status report');
              return;
            }

            // Smoke failure no longer blocks deployment — always report success
            const smokeOutcome = '${{ steps.smoke.outcome }}';
            const allExitCode  = '${{ steps.alltests.outputs.exit_code }}';
            const state = 'success';

            let description;
            if (smokeOutcome === 'success' && allExitCode === '0') {
              description = 'E2E tests all passed';
            } else if (smokeOutcome === 'success') {
              description = 'E2E smoke passed, some tests failed';
            } else {
              description = 'E2E smoke tests failed';
            }

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha,
              state,
              context: process.env.STATUS_CONTEXT,
              description,
              target_url: `https://github.com/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            });

            core.info(`Commit status "${state}" set on ${owner}/${repo}@${sha}`);

      # ── Deploy report to GitHub Pages ───────────────────────────────
      - name: Deploy Playwright report to GitHub Pages
        if: ${{ always() }}
        id: deploy-report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp -r playwright-report /tmp/playwright-report-${{ github.run_number }}

          git fetch origin gh-pages || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . || true
            echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>PetPals E2E Reports</title></head><body><h1>PetPals E2E Test Reports</h1><p>Select a run from the list below:</p><ul id="runs"></ul></body></html>' > index.html
            git add index.html
            git commit -m "Initialize GitHub Pages"
          fi

          RUN_DIR="run-${{ github.run_number }}"
          rm -rf "$RUN_DIR"
          cp -r /tmp/playwright-report-${{ github.run_number }} "$RUN_DIR"

          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          SMOKE_OUTCOME="${{ steps.smoke.outcome }}"
          ALL_EXIT_CODE="${{ steps.alltests.outputs.exit_code }}"
          FLAKY="${{ steps.stats.outputs.flaky }}"

          if [ "$SMOKE_OUTCOME" = "success" ] && [ "$ALL_EXIT_CODE" = "0" ]; then
            STATUS="✅ ALL PASSED"
          elif [ "$SMOKE_OUTCOME" = "success" ]; then
            STATUS="⚠️ SMOKE PASSED / SOME TESTS FAILED"
          else
            STATUS="❌ SMOKE FAILED"
          fi

          # Append flaky tag if any
          if [ "$FLAKY" != "0" ] && [ -n "$FLAKY" ]; then
            STATUS="${STATUS} (🔄 ${FLAKY} flaky)"
          fi

          NEW_ENTRY="<li><a href=\"${RUN_DIR}/index.html\">Run #${{ github.run_number }}</a> — ${STATUS} — ${TIMESTAMP}</li>"

          if grep -q '<ul id="runs">' index.html; then
            sed -i "s|<ul id=\"runs\">|<ul id=\"runs\">\n${NEW_ENTRY}|" index.html
          fi

          ls -d run-* 2>/dev/null | sort -t'-' -k2 -n | head -n -20 | xargs rm -rf || true

          git add -A
          git commit -m "Deploy Playwright report for run #${{ github.run_number }}" || echo "No changes to commit"
          git push origin gh-pages

          REPORT_URL="https://mzuhairiy.github.io/petpals-auto-test/${RUN_DIR}/index.html"
          echo "report_url=${REPORT_URL}" >> $GITHUB_OUTPUT
          echo "📋 Report published at: ${REPORT_URL}"

      # ── Send results to Discord ─────────────────────────────────────
      - name: Send test results to Discord
        if: ${{ always() }}
        run: |
          SMOKE_OUTCOME="${{ steps.smoke.outcome }}"
          ALL_EXIT_CODE="${{ steps.alltests.outputs.exit_code }}"

          # Stats parsed from Playwright CLI output (same source as HTML report)
          PASSED="${{ steps.stats.outputs.passed }}"
          FAILED="${{ steps.stats.outputs.failed }}"
          FLAKY="${{ steps.stats.outputs.flaky }}"
          SKIPPED="${{ steps.stats.outputs.skipped }}"
          TOTAL="${{ steps.stats.outputs.total }}"
          DURATION="${{ steps.stats.outputs.duration }}"

          if [ "$SMOKE_OUTCOME" = "success" ] && [ "$ALL_EXIT_CODE" = "0" ]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="ALL PASSED"
            COLOR=52269
          elif [ "$SMOKE_OUTCOME" = "success" ]; then
            STATUS_EMOJI="⚠️"
            STATUS_TEXT="SMOKE PASSED / SOME TESTS FAILED"
            COLOR=16760576
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="SMOKE FAILED"
            COLOR=16718116
          fi

          # Append flaky info to status text if any
          if [ "$FLAKY" != "0" ] && [ -n "$FLAKY" ]; then
            STATUS_TEXT="${STATUS_TEXT} (🔄 ${FLAKY} flaky)"
          fi

          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          REPORT_URL="${{ steps.deploy-report.outputs.report_url }}"

          cat > discord-payload.json << EOF
          {
            "embeds": [
              {
                "title": "${STATUS_EMOJI} PetPals E2E Tests ${STATUS_TEXT}",
                "color": ${COLOR},
                "fields": [
                  { "name": "Total", "value": "${TOTAL}", "inline": true },
                  { "name": "Passed", "value": "${PASSED}", "inline": true },
                  { "name": "Failed", "value": "${FAILED}", "inline": true },
                  { "name": "Flaky", "value": "${FLAKY}", "inline": true },
                  { "name": "Skipped", "value": "${SKIPPED}", "inline": true },
                  { "name": "Duration", "value": "${DURATION}", "inline": true },
                  { "name": "📋 Playwright Report", "value": "[Open in Browser](${REPORT_URL})", "inline": false },
                  { "name": "🔗 GitHub Actions", "value": "[View Run](${RUN_URL})", "inline": false }
                ],
                "footer": {
                  "text": "PetPals E2E • Run #${{ github.run_number }}"
                },
                "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              }
            ]
          }
          EOF

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d @discord-payload.json \
            "${{ secrets.DISCORD_WEBHOOK_URL }}")

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Discord notification sent successfully (HTTP ${HTTP_STATUS})"
          else
            echo "⚠️ Discord notification failed (HTTP ${HTTP_STATUS})"
            cat discord-payload.json
          fi
