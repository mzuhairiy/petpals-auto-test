name: E2E Tests (Repository Dispatch)

on:
  repository_dispatch:
    types: [run-e2e]

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      E2E_BASE_URL: ${{ github.event.client_payload.target_url }}
      COMMIT_SHA: ${{ github.event.client_payload.commit_sha }}
      SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
      # Map E2E_BASE_URL to BASE_URL so Playwright config picks it up
      BASE_URL: ${{ github.event.client_payload.target_url }}
      CI: true
      STATUS_CONTEXT: e2e/playwright

    steps:
      - name: Print dispatch payload
        run: |
          echo "=== Repository Dispatch Payload ==="
          echo "Event type:  ${{ github.event.action }}"
          echo "Target URL:  ${{ github.event.client_payload.target_url }}"
          echo "Commit SHA:  ${{ github.event.client_payload.commit_sha }}"
          echo "Source repo: ${{ github.event.client_payload.source_repo }}"
          echo "E2E_BASE_URL=$E2E_BASE_URL"
          echo "COMMIT_SHA=$COMMIT_SHA"
          echo "==================================="

      # ── Report pending status to PetPals commit ──────────────────────
      - name: "Set commit status: pending"
        if: ${{ github.event.client_payload.commit_sha != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PETPALS_STATUS_PAT }}
          script: |
            const sourceRepo = process.env.SOURCE_REPO || 'mzuhairiy/PetPals';
            const [owner, repo] = sourceRepo.split('/');
            const sha = process.env.COMMIT_SHA;

            if (!sha) {
              core.warning('commit_sha is empty – skipping status report');
              return;
            }

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha,
              state: 'pending',
              context: process.env.STATUS_CONTEXT,
              description: 'E2E tests running',
              target_url: `https://github.com/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            });

            core.info(`Commit status "pending" set on ${owner}/${repo}@${sha}`);

      - name: Checkout E2E repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        id: playwright
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results (screenshots/videos/traces)
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      # ── Report final status to PetPals commit ───────────────────────
      - name: "Set commit status: success/failure"
        if: ${{ always() && github.event.client_payload.commit_sha != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PETPALS_STATUS_PAT }}
          script: |
            const sourceRepo = process.env.SOURCE_REPO || 'mzuhairiy/PetPals';
            const [owner, repo] = sourceRepo.split('/');
            const sha = process.env.COMMIT_SHA;

            if (!sha) {
              core.warning('commit_sha is empty – skipping status report');
              return;
            }

            // Determine final state from the Playwright step outcome
            const playwrightOutcome = '${{ steps.playwright.outcome }}';
            const state = playwrightOutcome === 'success' ? 'success' : 'failure';
            const description = state === 'success'
              ? 'E2E tests passed'
              : 'E2E tests failed';

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha,
              state,
              context: process.env.STATUS_CONTEXT,
              description,
              target_url: `https://github.com/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            });

            core.info(`Commit status "${state}" set on ${owner}/${repo}@${sha}`);
